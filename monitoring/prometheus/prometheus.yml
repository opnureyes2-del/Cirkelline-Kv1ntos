# CIRKELLINE PROMETHEUS CONFIGURATION
# ====================================
# Version: v1.3.5
# Date: 2025-12-17

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cirkelline-monitor'
    environment: 'development'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - /etc/prometheus/alerts.yml

# Scrape configurations
scrape_configs:
  # ============================================================
  # PROMETHEUS SELF-MONITORING
  # ============================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ============================================================
  # ADMIRAL SOCIAL NEXUS (Flask /metrics via Prometheus instrumentation)
  # ============================================================
  - job_name: 'social-nexus'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:5592']
        labels:
          service: 'social-nexus'
          environment: 'development'
    scrape_interval: 15s
    scrape_timeout: 5s

  # ============================================================
  # ADMIRAL EXECUTOR (Flask /metrics)
  # ============================================================
  - job_name: 'executor'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:5593']
        labels:
          service: 'executor'
    scrape_interval: 30s

  # ============================================================
  # ADMIRAL EVENT BRIDGE (Flask /metrics via Prometheus instrumentation)
  # ============================================================
  - job_name: 'event-bridge'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:5594']
        labels:
          service: 'event-bridge'
    scrape_interval: 30s

  # ============================================================
  # ADMIRAL HQ (Flask /metrics via Prometheus instrumentation)
  # ============================================================
  - job_name: 'admiral-hq'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:5555']
        labels:
          service: 'admiral-hq'
    scrape_interval: 30s

  # ============================================================
  # ADMIRAL RUNTIME ENGINE (Hand-built /metrics — 28 admirals, skills, council)
  # ============================================================
  - job_name: 'runtime-engine'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:5596']
        labels:
          service: 'runtime-engine'
    scrape_interval: 30s

  # ============================================================
  # ADMIRAL PRE-EXECUTION ORCHESTRATOR (6-phase pipeline, port 5598)
  # Re-enabled 2026-03-08 — was disabled, now running
  # ============================================================
  - job_name: 'orchestrator'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:5598']
        labels:
          service: 'orchestrator'
    scrape_interval: 30s

  # ============================================================
  # SOVEREIGN PULSE (Hand-built /metrics — constellations, pulse count)
  # ============================================================
  - job_name: 'sovereign-pulse'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:5599']
        labels:
          service: 'sovereign-pulse'
    scrape_interval: 30s
