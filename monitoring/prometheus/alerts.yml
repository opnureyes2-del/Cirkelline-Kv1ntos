groups:
  - name: admiral_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} er NEDE"
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
      - alert: EngineMemoryHigh
        expr: process_resident_memory_bytes{job="runtime-engine"} > 2e9
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Engine RSS > 2GB"
